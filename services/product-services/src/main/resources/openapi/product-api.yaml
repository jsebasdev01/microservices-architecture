openapi: 3.0.3

info:
  title: Product Service
  version: 1.0.0
  description: Product management API

tags:
  - name: Product
    description: Product operations

paths:

  /products:
    get:

      tags:
        - Product
      operationId: getProducts
      summary: Get all products

      responses:
        '200':
          description: Products retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductResponse'

    post:
      tags:
        - Product
      operationId: createProduct
      summary: Create a new product

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'

      responses:
        '201':
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'

        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /products/{id}:

    get:
      tags:
        - Product
      operationId: getProductById
      summary: Get product by id

      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1

      responses:
        '200':
          description: Product found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'

        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Product
      operationId: updateProduct
      summary: Update product

      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'

      responses:
        '200':
          description: Product updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'

        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Product
      operationId: deleteProduct
      summary: Delete product

      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1

      responses:
        '204':
          description: Product deleted successfully

        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:

  schemas:

    ProductRequest:
      type: object

      required:
        - name
        - price
        - stock

      properties:

        name:
          type: string
          description: Product name
          minLength: 3
          maxLength: 100
          example: Laptop Lenovo ThinkPad

        description:
          type: string
          description: Product description
          maxLength: 500
          example: Business laptop with Intel Core Ultra processor

        price:
          type: number
          format: decimal
          description: Product price
          minimum: 0.01
          example: 999.99

        stock:
          type: integer
          description: Available stock
          minimum: 0
          example: 10

    ProductResponse:
      type: object

      required:
        - id
        - name
        - price
        - stock

      properties:

        id:
          type: integer
          format: int64
          example: 1

        name:
          type: string
          example: Laptop Lenovo ThinkPad

        description:
          type: string
          example: Business laptop with Intel Core Ultra processor

        price:
          type: number
          format: decimal
          example: 999.99

        stock:
          type: integer
          example: 10

    ErrorResponse:
      type: object

      required:
        - timestamp
        - status
        - message

      properties:

        timestamp:
          type: string
          format: date-time
          example: "2026-06-16T21:30:00Z"

        status:
          type: integer
          example: 404

        message:
          type: string
          example: Product not found with id 99